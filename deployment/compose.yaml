name: ai-quant-research-platform

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_quant}
      POSTGRES_USER: ${POSTGRES_USER:-ai_quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_development_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      AQR_ENVIRONMENT: ${AQR_ENVIRONMENT:-development}
      AQR_BACKEND_HOST: 0.0.0.0
      AQR_BACKEND_PORT: 8000
      AQR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_quant}:${POSTGRES_PASSWORD:-local_development_only}@postgres:5432/${POSTGRES_DB:-ai_quant}
      AQR_DATABASE_ECHO: ${AQR_DATABASE_ECHO:-false}
    ports:
      - "${AQR_BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://localhost:5173/ || exit 1
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  scanner:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: scanner/Dockerfile
    environment:
      AQR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_quant}:${POSTGRES_PASSWORD:-local_development_only}@postgres:5432/${POSTGRES_DB:-ai_quant}
      AQR_DATABASE_ECHO: ${AQR_DATABASE_ECHO:-false}
      AQR_ASHAREHUB_API_KEY: ${AQR_ASHAREHUB_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
