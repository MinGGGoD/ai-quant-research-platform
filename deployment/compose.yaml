name: ai-quant-research-platform

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_quant}
      POSTGRES_USER: ${POSTGRES_USER:-ai_quant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-local_development_only}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    environment:
      AQR_ENVIRONMENT: ${AQR_ENVIRONMENT:-development}
      AQR_BACKEND_HOST: 0.0.0.0
      AQR_BACKEND_PORT: 8000
      AQR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_quant}:${POSTGRES_PASSWORD:-local_development_only}@postgres:5432/${POSTGRES_DB:-ai_quant}
      AQR_DATABASE_ECHO: ${AQR_DATABASE_ECHO:-false}
      AQR_CORS_ORIGINS: '${AQR_CORS_ORIGINS:-["http://localhost:5173"]}'
      AQR_ASHAREHUB_API_KEY: ${AQR_ASHAREHUB_API_KEY:-}
      AQR_ASHAREHUB_TIMEOUT_SECONDS: ${AQR_ASHAREHUB_TIMEOUT_SECONDS:-20}
      AQR_ASHAREHUB_SYNC_MAX_REQUESTS: ${AQR_ASHAREHUB_SYNC_MAX_REQUESTS:-20}
      AQR_MARKET_DATA_PROVIDER: ${AQR_MARKET_DATA_PROVIDER:-auto}
      AQR_AI_PROVIDER: ${AQR_AI_PROVIDER:-disabled}
      AQR_AI_BASE_URL: ${AQR_AI_BASE_URL:-https://api.openai.com/v1}
      AQR_AI_API_KEY: ${AQR_AI_API_KEY:-}
      AQR_AI_MODEL: ${AQR_AI_MODEL:-}
      AQR_AI_TIMEOUT_SECONDS: ${AQR_AI_TIMEOUT_SECONDS:-30}
      AQR_AI_MAX_ATTEMPTS: ${AQR_AI_MAX_ATTEMPTS:-2}
      AQR_AI_MAX_OUTPUT_CHARACTERS: ${AQR_AI_MAX_OUTPUT_CHARACTERS:-6000}
      AQR_AI_MAX_OUTPUT_TOKENS: ${AQR_AI_MAX_OUTPUT_TOKENS:-1200}
      AQR_RAG_EMBEDDING_PROVIDER: ${AQR_RAG_EMBEDDING_PROVIDER:-local_hash}
      AQR_RAG_EMBEDDING_BASE_URL: ${AQR_RAG_EMBEDDING_BASE_URL:-https://api.openai.com/v1}
      AQR_RAG_EMBEDDING_API_KEY: ${AQR_RAG_EMBEDDING_API_KEY:-}
      AQR_RAG_EMBEDDING_MODEL: ${AQR_RAG_EMBEDDING_MODEL:-local-hash-v1}
      AQR_RAG_EMBEDDING_DIMENSIONS: ${AQR_RAG_EMBEDDING_DIMENSIONS:-256}
      AQR_RAG_EMBEDDING_TIMEOUT_SECONDS: ${AQR_RAG_EMBEDDING_TIMEOUT_SECONDS:-30}
      AQR_RAG_EMBEDDING_MAX_ATTEMPTS: ${AQR_RAG_EMBEDDING_MAX_ATTEMPTS:-2}
      AQR_RAG_CHUNK_SIZE: ${AQR_RAG_CHUNK_SIZE:-1200}
      AQR_RAG_CHUNK_OVERLAP: ${AQR_RAG_CHUNK_OVERLAP:-200}
      AQR_RAG_MAX_DOCUMENT_BYTES: ${AQR_RAG_MAX_DOCUMENT_BYTES:-10485760}
    ports:
      - "${AQR_BACKEND_PORT:-8000}:8000"
    volumes:
      - ../data/cache:/app/data/cache:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen('http://localhost:8000/health')
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:5173/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  scanner:
    profiles: ["tools"]
    build:
      context: ..
      dockerfile: scanner/Dockerfile
    environment:
      AQR_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-ai_quant}:${POSTGRES_PASSWORD:-local_development_only}@postgres:5432/${POSTGRES_DB:-ai_quant}
      AQR_DATABASE_ECHO: ${AQR_DATABASE_ECHO:-false}
      AQR_ASHAREHUB_API_KEY: ${AQR_ASHAREHUB_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
